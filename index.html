<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>clar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F5F3EE;}
.app-root{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden;background:#F5F3EE;}
.safe-top{flex-shrink:0;height:var(--safe-area-top,env(safe-area-inset-top,0));}
.safe-bottom{flex-shrink:0;height:var(--safe-area-bottom,env(safe-area-inset-bottom,0));}
.app-header{flex-shrink:0;padding:1.5rem 1.25rem 0.75rem;border-bottom:0.5px solid #E8E6E1;}
.logo{font-size:2.5rem;font-weight:700;color:#1C2E1C;letter-spacing:-1px;line-height:1;}
.logo span{color:#2E5C3E;}
.hello{font-size:0.8rem;color:#888;font-weight:500;margin-top:0.75rem;}
.title{font-size:1.5rem;font-weight:700;color:#1C2E1C;}
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;-ms-overflow-style:none;padding:0 0 1rem;}
.app-content::-webkit-scrollbar{display:none;}
.section{font-size:0.7rem;font-weight:700;color:#999;letter-spacing:1px;padding:1.25rem 1.25rem 0.5rem;text-transform:uppercase;}
.tile{display:flex;align-items:center;background:#fff;margin:0 1rem 0.625rem;border-radius:0.875rem;padding:0.875rem 1rem;border:0.5px solid #E8E6E1;gap:0.875rem;cursor:pointer;text-decoration:none;min-height:2.75rem;}
.tile:active{transform:scale(0.98);background:#FAFAF8;}
.tile.dim{opacity:0.5;pointer-events:none;}
.icon{width:3rem;height:3rem;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;font-size:1.375rem;flex-shrink:0;}
.tile-body{flex:1;min-width:0;}
.tile-name{font-size:1rem;font-weight:700;color:#1C2E1C;display:flex;align-items:center;gap:0.5rem;}
.tile-tag{font-size:0.8rem;color:#888;margin-top:0.125rem;}
.chevron{font-size:1.375rem;color:#CCC;flex-shrink:0;}
.badge-beta{font-size:0.7rem;font-weight:600;border-radius:0.375rem;padding:0.125rem 0.4375rem;color:#5B7AAE;background:#5B7AAE18;}
.badge-soon{font-size:0.7rem;font-weight:600;border-radius:0.375rem;padding:0.125rem 0.4375rem;color:#AAA;background:#F0EEE9;}
.footer{text-align:center;color:#BBB;font-size:0.75rem;padding:1.5rem 1.25rem;}
</style>
</head>
<body>
<div class="app-root">
  <div class="safe-top"></div>
  <div class="app-header">
    <div class="logo">clar<span>·</span></div>
    <div class="hello">Hallo</div>
    <div class="title">Deine clar·Apps</div>
  </div>
  <div class="app-content">
    <div class="section">Aktiv</div>
    <a class="tile" href="https://clar.markt.lautini.ch/app">
      <div class="icon" style="background:#C97B3A18;">🛒</div>
      <div class="tile-body">
        <div class="tile-name">clar·markt</div>
        <div class="tile-tag">Einkaufsplanung</div>
      </div>
      <div class="chevron">›</div>
    </a>
    <a class="tile" href="https://clar.heim.lautini.ch/heute">
      <div class="icon" style="background:#2E5C3E18;">🏠</div>
      <div class="tile-body">
        <div class="tile-name">clar·heim</div>
        <div class="tile-tag">Haushaltsorganisation</div>
      </div>
      <div class="chevron">›</div>
    </a>
    <a class="tile" href="https://clar.log.lautini.ch">
      <div class="icon" style="background:#5B7AAE18;">📖</div>
      <div class="tile-body">
        <div class="tile-name">clar·log <span class="badge-beta">beta</span></div>
        <div class="tile-tag">Stimulanzien-Tagebuch</div>
      </div>
      <div class="chevron">›</div>
    </a>
    <div class="section">Demnächst</div>
    <div class="tile dim">
      <div class="icon" style="background:#F0EEE9;">🕐</div>
      <div class="tile-body">
        <div class="tile-name">clar·tag <span class="badge-soon">bald</span></div>
        <div class="tile-tag">Tagesstruktur & Routinen</div>
      </div>
    </div>
    <div class="footer">clar by lautini</div>
  </div>
  <div class="safe-bottom"></div>
</div>
</body>
</html>
