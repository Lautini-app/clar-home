<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2E5C3E">
<title>clar</title>
<style>
:root{
  --green:#2E5C3E;
  --paper:#F5F3EE;
  --text:#1C2E1C;
  --muted:#7B8278;
  --line:#E7E3DA;
  --safe-area-top:env(safe-area-inset-top,0px);
  --safe-area-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--paper);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;}
button,input{font:inherit;}
button{border:0;background:none;color:inherit;cursor:pointer;}
.app-root{position:fixed;inset:0;overflow:hidden;background:var(--paper);}
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--paper);}
.screen.active{display:flex;}
.screen:not(.splash){background:var(--paper);}
.safe-view{padding-top:var(--safe-area-top);padding-bottom:var(--safe-area-bottom);}
.logo{font-weight:800;letter-spacing:-0.07em;line-height:0.9;user-select:none;}
.logo-dot{color:inherit;}
.splash{align-items:center;justify-content:center;background:var(--green);color:#fff;}
.splash .logo{font-size:4.7rem;}
.login,.paywall,.tiles{background:var(--paper);}
.center-screen{align-items:center;justify-content:center;padding:calc(var(--safe-area-top) + 1.25rem) 1.25rem calc(var(--safe-area-bottom) + 1.25rem);}
.card{width:100%;max-width:26rem;background:#fff;border-radius:1.25rem;padding:1.35rem;box-shadow:0 1.1rem 2.8rem rgba(28,46,28,0.10);border:1px solid rgba(28,46,28,0.06);}
.login-logo{font-size:3.4rem;color:var(--green);text-align:center;margin-bottom:1.5rem;}
.title{font-size:1.55rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:0.45rem;}
.copy{font-size:0.95rem;line-height:1.45;color:var(--muted);margin-bottom:1.2rem;}
.apple-button{width:100%;min-height:3.25rem;border-radius:0.75rem;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;gap:0.55rem;font-size:1rem;font-weight:600;}
.apple-button svg{width:1.15rem;height:1.15rem;fill:currentColor;}
.primary-button{width:100%;min-height:3.2rem;border-radius:0.9rem;background:var(--green);color:#fff;font-size:1rem;font-weight:750;display:flex;align-items:center;justify-content:center;padding:0 1rem;}
.secondary-button{width:100%;min-height:3.05rem;border-radius:0.9rem;background:#EEF1EC;color:var(--green);font-size:0.95rem;font-weight:750;display:flex;align-items:center;justify-content:center;padding:0 1rem;}
.apple-button:active,.primary-button:active,.secondary-button:active,.tile:active,.icon-button:active{transform:scale(0.98);}
button:disabled{opacity:0.55;cursor:default;transform:none!important;}
.message{min-height:1.2rem;margin-top:0.85rem;color:#A85738;font-size:0.82rem;line-height:1.4;text-align:center;}
.reviewer-hint{position:fixed;left:0;right:0;bottom:calc(var(--safe-area-bottom) + 1rem);text-align:center;color:#A5A9A2;font-size:0.78rem;font-weight:600;letter-spacing:0.02em;}
.paywall-actions{display:flex;flex-direction:column;gap:0.75rem;margin-top:1rem;}
.app-header{padding:calc(var(--safe-area-top) + 1rem) 1.1rem 0.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;background:var(--paper);border-bottom:1px solid rgba(28,46,28,0.06);}
.header-logo{font-size:2.15rem;color:var(--green);}
.icon-button{width:2.65rem;height:2.65rem;border-radius:999px;background:#fff;box-shadow:0 0.55rem 1.45rem rgba(28,46,28,0.08);display:flex;align-items:center;justify-content:center;color:var(--text);}
.icon-button svg{width:1.25rem;height:1.25rem;stroke:currentColor;}
.tiles-content{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:1rem 1rem calc(var(--safe-area-bottom) + 1rem);scrollbar-width:none;}
.tiles-content::-webkit-scrollbar{display:none;}
.tiles-status{min-height:1.25rem;margin:0.15rem 0 0.85rem;color:var(--muted);font-size:0.84rem;text-align:center;}
.section{margin:1.15rem 0 0.55rem;color:#969B93;font-size:0.72rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;}
.section:first-child{margin-top:0;}
.tile{width:100%;min-height:5.35rem;margin-bottom:0.7rem;padding:0.85rem 0.95rem;border-radius:14px;background:#fff;box-shadow:0 0.8rem 2rem rgba(28,46,28,0.08);display:flex;align-items:center;gap:0.9rem;text-align:left;}
.tile.disabled{opacity:0.45;cursor:default;}
.tile.locked{box-shadow:0 0.65rem 1.6rem rgba(28,46,28,0.06);}
.tile-icon{width:3.2rem;height:3.2rem;border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:1.45rem;flex-shrink:0;}
.tile-body{flex:1;min-width:0;}
.tile-name{display:flex;align-items:center;gap:0.45rem;color:var(--text);font-size:1.05rem;font-weight:800;letter-spacing:-0.02em;}
.tile-tag{margin-top:0.18rem;color:var(--muted);font-size:0.84rem;line-height:1.3;}
.tile-action{flex-shrink:0;color:#C2C5BE;font-size:1.45rem;font-weight:600;}
.tile.locked .tile-action{padding:0.45rem 0.65rem;border-radius:999px;background:#EEF1EC;color:var(--green);font-size:0.76rem;font-weight:800;}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:0.14rem 0.45rem;font-size:0.68rem;font-weight:800;line-height:1;color:#52739F;background:rgba(82,115,159,0.12);}
.badge.soon{color:#9A9D96;background:#EEECE5;}
.modal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:1.25rem;background:rgba(28,46,28,0.36);backdrop-filter:blur(10px);}
.modal.active{display:flex;}
.modal-card{width:100%;max-width:24rem;background:#fff;border-radius:1.25rem;padding:1.25rem;box-shadow:0 1.2rem 3.2rem rgba(28,46,28,0.18);}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;}
.modal-title{font-size:1.2rem;font-weight:800;letter-spacing:-0.03em;}
.close-button{width:2rem;height:2rem;border-radius:999px;background:#F1F0EA;color:var(--muted);font-weight:800;}
.form{display:flex;flex-direction:column;gap:0.75rem;}
.field{display:flex;flex-direction:column;gap:0.35rem;}
.field label{color:#7E857B;font-size:0.72rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;}
.input{width:100%;height:3.05rem;border:1px solid var(--line);border-radius:0.88rem;background:#FAF9F5;color:var(--text);outline:none;padding:0 0.9rem;font-size:1rem;}
.input:focus{border-color:var(--green);background:#fff;}
.modal-message{min-height:1.1rem;margin-top:0.75rem;color:#A85738;font-size:0.82rem;line-height:1.4;}
@media (min-width:560px){
  .tiles-content{max-width:32rem;width:100%;margin:0 auto;}
  .app-header{padding-left:calc(50% - 16rem);padding-right:calc(50% - 16rem);}
}
</style>
</head>
<body>

<script type="module">
import despiaNative from 'https://cdn.jsdelivr.net/npm/despia-native/+esm';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://cgwpzpnklxphqxlixtva.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnd3B6cG5rbHhwaHF4bGl4dHZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODcyNTcsImV4cCI6MjA5NDY2MzI1N30.t-VnUALdHsoNo9mJ6LV-lW4OntJLqHnF36SHb0rNP0c';
const VAULT_KEY = 'supabase_access_token';
const SPLASH_MS = 1500;
const APP_URLS = {
  markt: 'https://clar.markt.lautini.ch/app',
  heim: 'https://clar.heim.lautini.ch/heute',
  log: 'https://clar.log.lautini.ch'
};

const despia = window.despia || despiaNative;
window.despia = despia;

const isDespia = navigator.userAgent.toLowerCase().includes('despia') || Boolean(window.webkit?.messageHandlers?.despia);
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = {
  token: '',
  userId: '',
  reviewer: false,
  access: {
    bundle: false,
    single: false,
    checking: false
  }
};

const screens = {
  splash: document.getElementById('splash-screen'),
  login: document.getElementById('login-screen'),
  paywall: document.getElementById('paywall-screen'),
  tiles: document.getElementById('tiles-screen')
};
const appleLogin = document.getElementById('apple-login');
const loginCopy = document.getElementById('login-copy');
const loginStatus = document.getElementById('login-status');
const paywallButton = document.getElementById('paywall-button');
const restoreButton = document.getElementById('restore-button');
const paywallStatus = document.getElementById('paywall-status');
const tilesStatus = document.getElementById('tiles-status');
const accountButton = document.getElementById('account-button');
const reviewerModal = document.getElementById('reviewer-modal');
const reviewerForm = document.getElementById('reviewer-form');
const reviewerSubmit = document.getElementById('reviewer-submit');
const reviewerStatus = document.getElementById('reviewer-status');

function delay(ms) {
  return new Promise((resolve) => window.setTimeout(resolve, ms));
}

function withTimeout(promise, ms, message) {
  let timeoutId = 0;
  const timeout = new Promise((_, reject) => {
    timeoutId = window.setTimeout(() => reject(new Error(message)), ms);
  });
  return Promise.race([promise, timeout])
    .finally(() => window.clearTimeout(timeoutId));
}

function showScreen(name) {
  Object.entries(screens).forEach(([screenName, element]) => {
    element.classList.toggle('active', screenName === name);
  });
}

function hasDespia() {
  return isDespia && typeof despia === 'function';
}

function setLoginBusy(isBusy) {
  appleLogin.disabled = isBusy;
}

function setPaywallBusy(isBusy) {
  paywallButton.disabled = isBusy;
  restoreButton.disabled = isBusy;
}

function base64UrlDecode(value) {
  const normalized = value.replace(/-/g, '+').replace(/_/g, '/');
  const padded = normalized.padEnd(normalized.length + ((4 - normalized.length % 4) % 4), '=');
  return atob(padded);
}

function decodeJwt(token) {
  try {
    const payload = JSON.parse(base64UrlDecode(token.split('.')[1] || ''));
    return payload && typeof payload === 'object' ? payload : {};
  } catch (error) {
    return {};
  }
}

function hashString(value) {
  let hash = 0;
  for (let index = 0; index < value.length; index += 1) {
    hash = ((hash << 5) - hash + value.charCodeAt(index)) | 0;
  }
  return Math.abs(hash).toString(16);
}

function setToken(token, fallbackUserId = '') {
  state.token = token || '';
  const claims = state.token ? decodeJwt(state.token) : {};
  state.userId = fallbackUserId || claims.sub || claims.user_id || claims.uid || (state.token ? `token-${hashString(state.token)}` : '');
}

function getExternalId() {
  return encodeURIComponent(state.userId || 'clar-home-user');
}

function extractToken(payload) {
  if (!payload) return '';
  if (typeof payload === 'string') return payload;
  if (payload[VAULT_KEY]) return payload[VAULT_KEY];
  if (payload.supabase_access_token) return payload.supabase_access_token;
  if (payload.access_token) return payload.access_token;
  if (payload.jwt) return payload.jwt;
  if (payload.token) return payload.token;
  if (payload.session?.access_token) return payload.session.access_token;
  if (payload.data?.session?.access_token) return payload.data.session.access_token;
  if (payload.result) return extractToken(payload.result);
  if (payload.data) return extractToken(payload.data);
  return '';
}

function extractUserId(payload) {
  if (!payload || typeof payload !== 'object') return '';
  return payload.user_id || payload.userId || payload.external_id || payload.user?.id || payload.data?.user?.id || '';
}

async function readVaultToken() {
  if (!hasDespia()) return '';
  try {
    const result = await despia(`readvault://?key=${VAULT_KEY}`, [VAULT_KEY]);
    return extractToken(result);
  } catch (error) {
    throw new Error(error?.message || 'Vault konnte nicht gelesen werden.');
  }
}

async function saveVaultToken(token) {
  if (!token || !hasDespia()) return;
  const value = encodeURIComponent(token);
  await despia(`setvault://?key=${VAULT_KEY}&value=${value}&locked=false`);
}

function showLogin() {
  setLoginBusy(false);
  loginStatus.textContent = '';
  appleLogin.style.display = hasDespia() ? 'flex' : 'none';
  loginCopy.textContent = hasDespia()
    ? 'Melde dich mit Apple an, um deine clar·Apps zu öffnen.'
    : 'Apple Sign-In ist nur in der Despia App verfügbar.';
  showScreen('login');
}

function showPaywall(autoLaunch = true) {
  if (state.reviewer) {
    showTiles();
    return;
  }
  paywallStatus.textContent = '';
  setPaywallBusy(false);
  showScreen('paywall');
  if (autoLaunch) {
    window.setTimeout(() => launchPaywall(), 220);
  }
}

function activeIdentifiersFrom(data) {
  const identifiers = new Set();
  const now = Date.now();

  function isExpired(node) {
    const value = node?.expires_date || node?.expirationDate || node?.expiration_date || node?.expiresDate;
    if (!value) return false;
    const time = Date.parse(value);
    return Number.isFinite(time) && time <= now;
  }

  function visit(node, activeContext = false) {
    if (!node) return;
    if (typeof node === 'string') {
      if (activeContext) identifiers.add(node.toLowerCase());
      return;
    }
    if (Array.isArray(node)) {
      node.forEach((item) => visit(item, activeContext));
      return;
    }
    if (typeof node !== 'object') return;

    const active = activeContext || node.isActive === true || node.active === true || node.purchased === true || node.success === true || node.status === 'active';
    if (active && !isExpired(node)) {
      ['identifier', 'productIdentifier', 'product_id', 'productId', 'entitlement', 'id'].forEach((key) => {
        if (typeof node[key] === 'string') identifiers.add(node[key].toLowerCase());
      });
    }

    Object.entries(node).forEach(([key, value]) => {
      const keyLower = key.toLowerCase();
      const childIsActive = active || keyLower === 'active' || keyLower === 'activesubscriptions';
      if (childIsActive && !isExpired(value) && typeof value === 'object' && !Array.isArray(value)) {
        identifiers.add(keyLower);
      }
      visit(value, childIsActive);
    });
  }

  visit(data);
  return Array.from(identifiers);
}

function accessFromPurchaseData(data) {
  const identifiers = activeIdentifiersFrom(data);
  const activeText = identifiers.join(' ') || (typeof data === 'string' ? data.toLowerCase() : '');
  const bundle = /\b2apps\b|2_apps|bundle|all[_-]?apps|clar[_-]?plus/.test(activeText);
  const single = bundle || /\b1app\b|1_app|markt|market|single/.test(activeText);
  return { bundle, single, checking: false };
}

function applyAccess(access) {
  state.access = {
    bundle: Boolean(access.bundle),
    single: Boolean(access.single || access.bundle),
    checking: false
  };
  renderTiles();
}

function renderTile(id, unlocked, locked) {
  const tile = document.getElementById(`tile-${id}`);
  const action = tile.querySelector('.tile-action');
  tile.disabled = state.access.checking;
  tile.classList.toggle('locked', Boolean(locked));
  tile.classList.toggle('disabled', state.access.checking);
  action.textContent = locked ? '🔒 Freischalten' : '›';
  tile.setAttribute('aria-label', locked ? `${tile.dataset.app} freischalten` : `${tile.dataset.app} öffnen`);
  tile.setAttribute('aria-disabled', state.access.checking ? 'true' : 'false');
  if (unlocked) {
    tile.dataset.locked = 'false';
  } else {
    tile.dataset.locked = 'true';
  }
}

function renderTiles() {
  if (state.reviewer) {
    state.access = { bundle: true, single: true, checking: false };
  }

  const checking = state.access.checking;
  const allApps = state.reviewer || state.access.bundle;
  const marketOnly = !allApps && state.access.single;

  tilesStatus.textContent = state.reviewer
    ? 'Reviewer Access aktiv.'
    : checking
      ? 'Abo wird geprüft...'
      : '';
  renderTile('markt', allApps || marketOnly, false);
  renderTile('heim', allApps, marketOnly);
  renderTile('log', allApps, marketOnly);
}

function showTiles() {
  renderTiles();
  showScreen('tiles');
}

async function getPurchaseHistory() {
  if (!hasDespia()) return null;
  return despia('getpurchasehistory://', ['restoredData']);
}

async function refreshPurchaseAccess(options = {}) {
  const { redirectToPaywall = true } = options;
  if (state.reviewer) {
    applyAccess({ bundle: true, single: true });
    showTiles();
    return true;
  }

  state.access = { ...state.access, checking: true };
  renderTiles();

  try {
    const history = await getPurchaseHistory();
    const purchaseData = history?.restoredData || history;
    const access = accessFromPurchaseData(purchaseData);

    if (!access.bundle && !access.single && !redirectToPaywall && (state.access.bundle || state.access.single)) {
      state.access = { ...state.access, checking: false };
      renderTiles();
      return false;
    }

    applyAccess(access);

    if (!access.bundle && !access.single) {
      if (redirectToPaywall) showPaywall(true);
      return false;
    }

    showTiles();
    return true;
  } catch (error) {
    state.access = { bundle: false, single: false, checking: false };
    renderTiles();
    if (redirectToPaywall) {
      showPaywall(false);
      paywallStatus.textContent = 'Abo konnte nicht geprüft werden. Bitte erneut versuchen.';
    }
    return false;
  }
}

async function completeAppleLogin(payload) {
  const token = extractToken(payload);
  if (!token) throw new Error('Kein Token erhalten.');
  setToken(token, extractUserId(payload));
  await saveVaultToken(token);
  showPaywall(true);
}

async function handleClerkPayload(payload) {
  if (!payload || payload.ok === false || payload.error) {
    const message = payload?.error?.message || payload?.message || 'Apple Anmeldung fehlgeschlagen.';
    throw new Error(message);
  }

  const token = extractToken(payload);
  if (token) {
    await completeAppleLogin(payload);
    return;
  }

  if ((payload.event === 'signIn' || payload.event === 'signUp' || payload.event === 'authview') && payload.status === 'complete' && hasDespia()) {
    const tokenPayload = await despia('clerk://token');
    await completeAppleLogin(tokenPayload);
  }
}

window.onClerkEvent = (payload) => {
  handleClerkPayload(payload)
    .catch((error) => {
      setLoginBusy(false);
      loginStatus.textContent = error.message || 'Apple Anmeldung fehlgeschlagen.';
    });
};

window.onRevenueCatPurchase = async (payload) => {
  const access = accessFromPurchaseData(payload);
  if (access.bundle || access.single) {
    applyAccess(access);
  } else {
    applyAccess({ bundle: true, single: true });
  }
  showTiles();
  await refreshPurchaseAccess({ redirectToPaywall: false });
};

async function launchPaywall() {
  if (!hasDespia()) {
    paywallStatus.textContent = 'Paywall ist nur in der Despia App verfügbar.';
    return;
  }

  setPaywallBusy(true);
  paywallStatus.textContent = '';

  try {
    const payload = await despia(`revenuecat://launchPaywall?external_id=${getExternalId()}&offering=default`);
    if (payload?.purchased || payload?.success || payload?.restoredData) {
      await window.onRevenueCatPurchase(payload);
    }
  } catch (error) {
    paywallStatus.textContent = error?.message || 'Paywall konnte nicht geöffnet werden.';
  } finally {
    setPaywallBusy(false);
  }
}

async function openRevenueCatCenter() {
  if (!hasDespia()) return;
  try {
    await despia(`revenuecat://center?external_id=${getExternalId()}`);
    await refreshPurchaseAccess({ redirectToPaywall: false });
  } catch (error) {
    tilesStatus.textContent = 'Abo-Verwaltung konnte nicht geöffnet werden.';
  }
}

function openReviewerModal() {
  reviewerStatus.textContent = '';
  reviewerSubmit.disabled = false;
  reviewerModal.classList.add('active');
  window.setTimeout(() => document.getElementById('reviewer-password').focus(), 120);
}

function closeReviewerModal() {
  reviewerModal.classList.remove('active');
}

function setupReviewerAccess() {
  let tapCount = 0;
  let tapTimer = 0;
  document.querySelectorAll('[data-secret-logo]').forEach((logo) => {
    logo.addEventListener('click', () => {
      tapCount += 1;
      window.clearTimeout(tapTimer);
      tapTimer = window.setTimeout(() => {
        tapCount = 0;
      }, 1600);
      if (tapCount >= 5) {
        tapCount = 0;
        openReviewerModal();
      }
    });
  });
}

function setupEvents() {
  appleLogin.addEventListener('click', async () => {
    if (!hasDespia()) {
      loginStatus.textContent = 'Apple Sign-In ist nur in der Despia App verfügbar.';
      return;
    }

    setLoginBusy(true);
    loginStatus.textContent = '';

    try {
      const payload = await despia('clerk://apple');
      if (payload) await handleClerkPayload(payload);
    } catch (error) {
      setLoginBusy(false);
      loginStatus.textContent = error?.message || 'Apple Anmeldung fehlgeschlagen.';
    }
  });

  paywallButton.addEventListener('click', () => launchPaywall());
  restoreButton.addEventListener('click', () => refreshPurchaseAccess({ redirectToPaywall: false }));
  accountButton.addEventListener('click', () => openRevenueCatCenter());

  ['markt', 'heim', 'log'].forEach((id) => {
    document.getElementById(`tile-${id}`).addEventListener('click', () => {
      const tile = document.getElementById(`tile-${id}`);
      if (state.access.checking) return;
      if (tile.dataset.locked === 'true') {
        showPaywall(true);
        return;
      }
      window.location.assign(APP_URLS[id]);
    });
  });

  document.getElementById('reviewer-close').addEventListener('click', closeReviewerModal);
  reviewerModal.addEventListener('click', (event) => {
    if (event.target === reviewerModal) closeReviewerModal();
  });
  reviewerForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    reviewerSubmit.disabled = true;
    reviewerStatus.textContent = '';

    const email = document.getElementById('reviewer-email').value.trim();
    const password = document.getElementById('reviewer-password').value;

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      state.reviewer = true;
      setToken(data.session?.access_token || '', data.user?.id || '');
      closeReviewerModal();
      applyAccess({ bundle: true, single: true });
      showTiles();
    } catch (error) {
      reviewerSubmit.disabled = false;
      reviewerStatus.textContent = error?.message || 'Reviewer Login fehlgeschlagen.';
    }
  });
}

async function init() {
  setupEvents();
  setupReviewerAccess();

  const splash = delay(SPLASH_MS);
  let token = '';
  try {
    [token] = await Promise.all([
      withTimeout(readVaultToken(), SPLASH_MS, 'Vault konnte nicht gelesen werden.'),
      splash
    ]);
  } catch (error) {
    await splash;
    showLogin();
    return;
  }

  if (token) {
    setToken(token);
    showTiles();
    await refreshPurchaseAccess({ redirectToPaywall: true });
    return;
  }

  showLogin();
}

init();
</script>
</body>
