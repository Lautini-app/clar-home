<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>clar</title>
<script src="https://cdn.jsdelivr.net/npm/despia-native/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F5F3EE;}
.app-root{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden;background:#F5F3EE;}
.safe-top{flex-shrink:0;height:var(--safe-area-top,env(safe-area-inset-top,0));}
.safe-bottom{flex-shrink:0;height:var(--safe-area-bottom,env(safe-area-inset-bottom,0));}
.app-header{flex-shrink:0;padding:1.5rem 1.25rem 0.75rem;border-bottom:0.5px solid #E8E6E1;}
.logo{font-size:2.5rem;font-weight:700;color:#1C2E1C;letter-spacing:-1px;line-height:1;}
.logo span{color:#2E5C3E;}
.hello{font-size:0.8rem;color:#888;font-weight:500;margin-top:0.75rem;}
.title{font-size:1.5rem;font-weight:700;color:#1C2E1C;}
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;-ms-overflow-style:none;padding:0 0 1rem;}
.app-content::-webkit-scrollbar{display:none;}
.screen{display:none;}
.screen.active{display:block;}
.login-card{background:#fff;margin:1rem;border-radius:1.25rem;border:0.5px solid #E8E6E1;padding:1.25rem;box-shadow:0 0.75rem 2rem #1C2E1C0D;}
.login-title{font-size:1.25rem;font-weight:700;color:#1C2E1C;margin-bottom:0.375rem;}
.login-copy{font-size:0.9rem;line-height:1.4;color:#777;margin-bottom:1rem;}
.form{display:flex;flex-direction:column;gap:0.75rem;}
.field{display:flex;flex-direction:column;gap:0.375rem;}
.field label{font-size:0.75rem;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:0.5px;}
.input{width:100%;height:3rem;border:0.5px solid #E8E6E1;border-radius:0.875rem;background:#FAFAF8;color:#1C2E1C;font:inherit;font-size:1rem;padding:0 0.875rem;outline:none;}
.input:focus{border-color:#2E5C3E;background:#fff;}
.button{width:100%;min-height:3rem;border:0;border-radius:0.875rem;background:#2E5C3E;color:#fff;font:inherit;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.button:active{transform:scale(0.98);}
.button:disabled{opacity:0.65;cursor:default;transform:none;}
.button.apple{background:#1C2E1C;}
.status{min-height:1.125rem;color:#B45A3C;font-size:0.8rem;line-height:1.4;margin-top:0.75rem;}
.loading{display:flex;align-items:center;gap:0.625rem;color:#777;font-size:0.9rem;margin:1rem;}
.spinner{width:1rem;height:1rem;border:2px solid #E8E6E1;border-top-color:#2E5C3E;border-radius:999px;animation:spin 0.8s linear infinite;}
.section{font-size:0.7rem;font-weight:700;color:#999;letter-spacing:1px;padding:1.25rem 1.25rem 0.5rem;text-transform:uppercase;}
.tile{display:flex;align-items:center;background:#fff;margin:0 1rem 0.625rem;border-radius:0.875rem;padding:0.875rem 1rem;border:0.5px solid #E8E6E1;gap:0.875rem;cursor:pointer;text-decoration:none;min-height:2.75rem;}
.tile:active{transform:scale(0.98);background:#FAFAF8;}
.tile.dim{opacity:0.5;pointer-events:none;}
.icon{width:3rem;height:3rem;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;font-size:1.375rem;flex-shrink:0;}
.tile-body{flex:1;min-width:0;}
.tile-name{font-size:1rem;font-weight:700;color:#1C2E1C;display:flex;align-items:center;gap:0.5rem;}
.tile-tag{font-size:0.8rem;color:#888;margin-top:0.125rem;}
.chevron{font-size:1.375rem;color:#CCC;flex-shrink:0;}
.badge-beta{font-size:0.7rem;font-weight:600;border-radius:0.375rem;padding:0.125rem 0.4375rem;color:#5B7AAE;background:#5B7AAE18;}
.badge-soon{font-size:0.7rem;font-weight:600;border-radius:0.375rem;padding:0.125rem 0.4375rem;color:#AAA;background:#F0EEE9;}
.footer{text-align:center;color:#BBB;font-size:0.75rem;padding:1.5rem 1.25rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="app-root">
  <div class="safe-top"></div>
  <div class="app-header">
    <div class="logo">clar<span>·</span></div>
    <div class="hello">Hallo</div>
    <div class="title">Deine clar·Apps</div>
  </div>
  <div class="app-content">
    <div id="loading-screen" class="screen active">
      <div class="loading">
        <div class="spinner" aria-hidden="true"></div>
        <div>Anmeldung wird geprüft...</div>
      </div>
    </div>
    <div id="login-screen" class="screen">
      <div class="login-card">
        <div class="login-title">Einloggen</div>
        <div id="login-copy" class="login-copy">Melde dich an, um deine clar·Apps zu öffnen.</div>
        <button id="apple-login" class="button apple" type="button">Mit Apple anmelden</button>
        <form id="email-login" class="form">
          <div class="field">
            <label for="email">E-Mail</label>
            <input id="email" class="input" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="password">Passwort</label>
            <input id="password" class="input" type="password" autocomplete="current-password" required>
          </div>
          <button id="email-submit" class="button" type="submit">Einloggen</button>
        </form>
        <div id="login-status" class="status" role="status" aria-live="polite"></div>
      </div>
    </div>
    <div id="tiles-screen" class="screen">
      <div class="section">Aktiv</div>
      <a id="tile-markt" class="tile" href="https://clar.markt.lautini.ch/app">
        <div class="icon" style="background:#C97B3A18;">🛒</div>
        <div class="tile-body">
          <div class="tile-name">clar·markt</div>
          <div class="tile-tag">Einkaufsplanung</div>
        </div>
        <div class="chevron">›</div>
      </a>
      <a id="tile-heim" class="tile" href="https://clar.heim.lautini.ch/heute">
        <div class="icon" style="background:#2E5C3E18;">🏠</div>
        <div class="tile-body">
          <div class="tile-name">clar·heim</div>
          <div class="tile-tag">Haushaltsorganisation</div>
        </div>
        <div class="chevron">›</div>
      </a>
      <a id="tile-log" class="tile" href="https://clar.log.lautini.ch">
        <div class="icon" style="background:#5B7AAE18;">📖</div>
        <div class="tile-body">
          <div class="tile-name">clar·log <span class="badge-beta">beta</span></div>
          <div class="tile-tag">Stimulanzien-Tagebuch</div>
        </div>
        <div class="chevron">›</div>
      </a>
      <div class="section">Demnächst</div>
      <div class="tile dim">
        <div class="icon" style="background:#F0EEE9;">🕐</div>
        <div class="tile-body">
          <div class="tile-name">clar·tag <span class="badge-soon">bald</span></div>
          <div class="tile-tag">Tagesstruktur & Routinen</div>
        </div>
      </div>
      <div class="footer">clar by lautini</div>
    </div>
  </div>
  <div class="safe-bottom"></div>
</div>
<script>
const SUPABASE_URL = 'https://cgwpzpnklxphqxlixtva.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6ImNnd3B6cG5rbHhwaHF4bGl4dHZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODcyNTcsImV4cCI6MjA5NDY2MzI1N30.t-VnUALdHsoNo9mJ6LV-lW4OntJLqHnF36SHb0rNP0c';
const VAULT_KEY = 'supabase_token';
const isDespia = navigator.userAgent.toLowerCase().includes('despia');
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const screens = {
  loading: document.getElementById('loading-screen'),
  login: document.getElementById('login-screen'),
  tiles: document.getElementById('tiles-screen')
};
const appleLogin = document.getElementById('apple-login');
const emailLogin = document.getElementById('email-login');
const emailSubmit = document.getElementById('email-submit');
const loginStatus = document.getElementById('login-status');
const loginCopy = document.getElementById('login-copy');

function showScreen(name) {
  Object.keys(screens).forEach((key) => {
    screens[key].classList.toggle('active', key === name);
  });
}

function setStatus(message) {
  loginStatus.textContent = message || '';
}

function setBusy(isBusy) {
  appleLogin.disabled = isBusy;
  emailSubmit.disabled = isBusy;
}

function withToken(url, token) {
  const nextUrl = new URL(url);
  nextUrl.searchParams.set('token', token);
  return nextUrl.toString();
}

function renderTiles(token) {
  document.getElementById('tile-markt').href = withToken('https://clar.markt.lautini.ch/app', token);
  document.getElementById('tile-heim').href = withToken('https://clar.heim.lautini.ch/heute', token);
  document.getElementById('tile-log').href = withToken('https://clar.log.lautini.ch', token);
  showScreen('tiles');
}

async function readVaultToken() {
  if (!isDespia || typeof window.despia !== 'function') return '';

  try {
    const data = await window.despia('readvault://?key=supabase_token', ['supabase_token']);
    return data && data.supabase_token ? data.supabase_token : '';
  } catch (error) {
    return '';
  }
}

async function saveVaultToken(token) {
  if (!token || !isDespia || typeof window.despia !== 'function') return;

  await window.despia(`setvault://?key=${VAULT_KEY}&value=${encodeURIComponent(token)}`);
}

async function completeLogin(token) {
  if (!token) {
    throw new Error('Kein Token erhalten.');
  }

  await saveVaultToken(token);
  renderTiles(token);
}

function showLogin() {
  setBusy(false);
  setStatus('');
  appleLogin.style.display = isDespia ? 'flex' : 'none';
  emailLogin.style.display = isDespia ? 'none' : 'flex';
  loginCopy.textContent = isDespia
    ? 'Melde dich mit Apple an, um deine clar·Apps zu öffnen.'
    : 'Melde dich mit E-Mail und Passwort an, um deine clar·Apps zu öffnen.';
  showScreen('login');
}

function handleClerkToken(payload) {
  const token = payload && (payload.jwt || window.clerkJWT);
  if (!token) return;

  completeLogin(token).catch((error) => {
    setBusy(false);
    setStatus(error.message || 'Apple Anmeldung konnte nicht gespeichert werden.');
  });
}

window.onClerkEvent = (payload) => {
  if (!payload || payload.ok === false) {
    setBusy(false);
    setStatus((payload && payload.error && payload.error.message) || 'Apple Anmeldung fehlgeschlagen.');
    return;
  }

  if (payload.event === 'signIn' || payload.event === 'signUp' || payload.event === 'authview') {
    if (payload.status === 'complete' && typeof window.despia === 'function') {
      window.despia('clerk://token');
    }
  }

  if (payload.event === 'token') {
    handleClerkToken(payload);
  }
};

appleLogin.addEventListener('click', async () => {
  if (!isDespia || typeof window.despia !== 'function') {
    setStatus('Apple Sign-In ist nur in der Despia App verfügbar.');
    return;
  }

  setBusy(true);
  setStatus('');

  try {
    await window.despia('clerk://apple');
  } catch (error) {
    try {
      await window.despia('clerk://manual?method=apple');
    } catch (fallbackError) {
      setBusy(false);
      setStatus((fallbackError && fallbackError.message) || 'Apple Anmeldung fehlgeschlagen.');
    }
  }
});

emailLogin.addEventListener('submit', async (event) => {
  event.preventDefault();
  setBusy(true);
  setStatus('');

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;

    await completeLogin(data.session && data.session.access_token);
  } catch (error) {
    setBusy(false);
    setStatus((error && error.message) || 'Login fehlgeschlagen.');
  }
});

document.addEventListener('DOMContentLoaded', async () => {
  const token = await readVaultToken();

  if (token) {
    renderTiles(token);
    return;
  }

  showLogin();
});
</script>
</body>
</html>
