<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F3EE">
<title>clar</title>
<style>
:root{
  --paper:#F5F3EE;
  --green:#2E5C3E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--paper);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{display:grid;place-items:center;padding:2rem;color:var(--green);}
.home{display:flex;flex-direction:column;align-items:center;gap:2rem;}
.logo{font-size:4rem;font-weight:800;letter-spacing:-0.07em;line-height:0.9;}
.apple-button{min-width:17rem;min-height:3.25rem;border:0;border-radius:0.75rem;background:#000;color:#fff;font:600 1rem/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;cursor:pointer;}
.apple-button:active{transform:scale(0.98);}
</style>
</head>
<body>
<main class="home">
  <div class="logo" aria-label="clar Logo">clar·</div>
  <button class="apple-button" type="button" onclick="window.despia && window.despia('clerk://apple')">Mit Apple anmelden</button>
</main>
</body>
</html>
